name: ExamDojo CI/CD Pipeline

on:
  push:
    branches: [main] # Trigger on push to main branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Build Docker Image (Test)
        run: |
          cd backend
          docker build -t examdojo-backend .
